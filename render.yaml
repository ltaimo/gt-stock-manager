services:
  - type: web
    name: gt-stock-manager
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.maintenance.migrate_schema && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ENVIRONMENT
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: APP_NAME
        value: Sistema de Gestão de Stock
      - key: APP_SUBTITLE
        value: Gestão de Terminais, SA
      - key: APP_SHORT_NAME
        value: GT Stock Manager
      - key: APP_VERSION
        value: "2.1.0"
      - key: DATABASE_URL
        sync: false
      - key: UPLOADS_DIR
        value: /tmp/uploads
      - key: OUTPUTS_DIR
        value: /tmp/outputs
      - key: DOCUMENTS_DIR
        value: /tmp/uploads/stock_documents
      - key: EMAIL_OUTBOX_DIR
        value: /tmp/outputs/email_outbox
      - key: SECRET_KEY
        generateValue: true
      - key: RESET_STOCK_SECURITY_CODE
        sync: false
      - key: WHATSAPP_SENDER
        value: "+258844231830"
      - key: WHATSAPP_WEBHOOK_URL
        sync: false
