services:
  - type: web
    name: gt-stock-manager
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.maintenance.migrate_schema && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ENVIRONMENT
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: APP_NAME
        value: GT Integrated Management System
      - key: APP_SUBTITLE
        value: Gestão de Terminais, SA
      - key: APP_SHORT_NAME
        value: GTIMS
      - key: APP_VERSION
        value: "3.0.0"
      - key: INITIAL_SUPERADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: UPLOADS_DIR
        value: /opt/render/project/src/.runtime/uploads
      - key: OUTPUTS_DIR
        value: /opt/render/project/src/.runtime/outputs
      - key: DOCUMENTS_DIR
        value: /opt/render/project/src/.runtime/uploads/stock_documents
      - key: EMAIL_OUTBOX_DIR
        value: /opt/render/project/src/.runtime/outputs/email_outbox
      - key: SECRET_KEY
        generateValue: true
      - key: RESET_STOCK_SECURITY_CODE
        sync: false
      - key: WHATSAPP_SENDER
        value: "+258844231830"
      - key: WHATSAPP_WEBHOOK_URL
        sync: false
      - key: SYNC_MODE
        value: off
      - key: SYNC_TOKEN
        sync: false
      - key: MIRROR_READ_ONLY
        value: "true"
