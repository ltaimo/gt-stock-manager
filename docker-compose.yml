services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: stock_manager
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: change-this-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_user -d stock_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Sistema de Gestão de Stock
      APP_SUBTITLE: Gestão de Terminais, SA
      APP_SHORT_NAME: GT Stock Manager
      ENVIRONMENT: production
      SECRET_KEY: replace-with-a-long-random-secret
      DATABASE_URL: postgresql+psycopg://stock_user:change-this-password@db:5432/stock_manager
      UPLOADS_DIR: /data/uploads
      OUTPUTS_DIR: /data/outputs
      DOCUMENTS_DIR: /data/uploads/stock_documents
      EMAIL_OUTBOX_DIR: /data/outputs/email_outbox
      LOGO_PATH: /app/app/static/img/logo-gt.png
      SESSION_COOKIE_SECURE: "false"
    volumes:
      - app_data:/data
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  app_data:
