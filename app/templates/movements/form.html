{% extends "base.html" %}
{% block content %}
<section class="panel narrow"><h1>Novo Movimento</h1>
{% if error %}<div class="alert red">{{ error }}</div>{% endif %}
<form method="post" class="form-stack" enctype="multipart/form-data">
  <label>Produto<select name="product_id" required>{% for p in products %}<option value="{{ p.id }}">{{ p.code }} · {{ p.name }} · disponível {{ p.current_stock }} {{ p.unit }}</option>{% endfor %}</select></label>
  <label>Acção<select name="action_type" required><option>ENTRADA</option><option>SAÍDA</option><option>DEVOLUÇÃO</option></select></label>
  <label>Quantidade<input name="quantity" type="number" step="0.01" min="0.01" required></label>
  <label>Departamento / Destino<select name="department_id" required><option value="">Escolher departamento</option>{% for d in departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}</select></label>
  <label>Referência<input name="reference_number"></label>
  <div class="form-grid">
    <label>Tipo de documento<select name="document_type"><option>Guia</option><option>Fatura</option><option>Proforma</option><option>Outro</option></select></label>
    <label>Nº do documento<input name="document_number"></label>
  </div>
  <label>Documento anexo<input type="file" name="document_file" accept=".pdf,.png,.jpg,.jpeg,.webp,.doc,.docx,.xls,.xlsx"></label>
  <label>Observações<textarea name="notes"></textarea></label>
  <button>Registar</button>
</form></section>
{% endblock %}
