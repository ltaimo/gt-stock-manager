{% extends "base.html" %}
{% block content %}
<header class="page-header">
  <h1>Novo Movimento</h1>
  <a class="button secondary" href="/movimentos">Voltar aos movimentos</a>
</header>
<section class="panel narrow">
{% if error %}<div class="alert red">{{ error }}</div>{% endif %}
<form method="post" class="form-stack" enctype="multipart/form-data">
  <label>Produto<select name="product_id" required>{% for p in products %}<option value="{{ p.id }}">{{ p.code }} · {{ p.name }} · disponível {{ p.current_stock }} {{ p.unit }}</option>{% endfor %}</select></label>
  <fieldset class="movement-action-fieldset">
    <legend>Acção</legend>
    <div class="movement-actions" id="movement-action">
      <label class="movement-action entry">
        <input type="radio" name="action_type" value="ENTRADA" checked>
        <strong>Entrada</strong><span>Adicionar ao stock</span>
      </label>
      <label class="movement-action exit">
        <input type="radio" name="action_type" value="SAÍDA">
        <strong>Saída</strong><span>Retirar do stock</span>
      </label>
      <label class="movement-action return">
        <input type="radio" name="action_type" value="DEVOLUÇÃO">
        <strong>Devolução</strong><span>Devolver ao stock</span>
      </label>
    </div>
  </fieldset>
  <label>Quantidade<input name="quantity" type="number" step="0.01" min="0.01" required></label>
  <div data-movement-entry>
    <label>Origem / Fornecedor
      <input name="origin" placeholder="Empresa, fornecedor ou local de origem">
    </label>
  </div>
  <div class="form-grid" data-movement-exit hidden>
    <label>Departamento / Destino
      <select name="department_id">
        <option value="">Escolher departamento</option>
        {% for d in departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
      </select>
    </label>
    <label>Requisitante
      <select name="requesting_user_id">
        <option value="">Escolher utilizador, se aplicável</option>
        {% for requester in requesters %}<option value="{{ requester.id }}">{{ requester.full_name }}</option>{% endfor %}
      </select>
    </label>
    <label>Responsável pela entrega
      <input name="responsible_person" placeholder="Nome de quem entregou ou autorizou">
    </label>
  </div>
  <label>Referência do movimento<input name="reference_number" placeholder="Guia, requisição, fatura ou outra referência"></label>
  <div class="form-grid" data-movement-document>
    <label>Tipo de documento<select name="document_type"><option>Guia</option><option>Fatura</option><option>Proforma</option><option>Outro</option></select></label>
    <label>Nº do documento<input name="document_number"></label>
  </div>
  <label data-movement-document>Documento anexo<input type="file" name="document_file" accept=".pdf,.png,.jpg,.jpeg,.webp,.doc,.docx,.xls,.xlsx"></label>
  <label>Observações<textarea name="notes"></textarea></label>
  <div class="actions">
    <a class="button secondary" href="/movimentos">Cancelar</a>
    <button class="success">Registar movimento</button>
  </div>
</form></section>
{% endblock %}
