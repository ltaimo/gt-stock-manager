{% extends "base.html" %}
{% block content %}
<section class="panel narrow">
  <h1>{{ tx("Redefinir Senha", user if user is defined else none) }}</h1>
  {% if error %}<div class="alert red">{{ tm(error, user if user is defined else none, request) }}</div>{% endif %}
  <form method="post" class="form-stack">
    <label>{{ tx("Nova senha", user if user is defined else none) }}<input name="password" type="password" required minlength="8"></label>
    <label>{{ tx("Confirmar senha", user if user is defined else none) }}<input name="confirm_password" type="password" required minlength="8"></label>
    <button>{{ tx("Guardar", user if user is defined else none) }}</button>
  </form>
</section>
{% endblock %}
