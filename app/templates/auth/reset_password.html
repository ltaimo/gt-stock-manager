{% extends "base.html" %}
{% block content %}
<section class="panel narrow">
  <h1>Redefinir Senha</h1>
  {% if error %}<div class="alert red">{{ error }}</div>{% endif %}
  <form method="post" class="form-stack">
    <label>Nova senha<input name="password" type="password" required minlength="8"></label>
    <label>Confirmar senha<input name="confirm_password" type="password" required minlength="8"></label>
    <button>Guardar</button>
  </form>
</section>
{% endblock %}
