{% extends "base.html" %}
{% block content %}
<section class="login-card">
  <div class="login-logo">
    {% if logo_available() %}
      <img src="/static/img/logo-gt.png" alt="Gestão de Terminais, SA">
    {% else %}
      <span class="brand-mark large">GT</span>
    {% endif %}
  </div>
  <h1>{{ tx(app_name, user if user is defined else none) }}</h1>
  <p>{{ app_subtitle }}</p>
  {% if error %}<div class="alert red">{{ tm(error, user if user is defined else none, request) }}</div>{% endif %}
  <form method="post" class="form-stack">
    <label>{{ tx("Nome de utilizador", user if user is defined else none) }}<input name="username" required autofocus></label>
    <label>{{ tx("Senha", user if user is defined else none) }}<input name="password" type="password" required></label>
    <button>{{ tx("Entrar", user if user is defined else none) }}</button>
  </form>
</section>
{% endblock %}
