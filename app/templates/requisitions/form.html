{% extends "base.html" %}
{% block content %}
<header class="page-header">
  <h1>Nova Requisição</h1>
  <a class="button secondary" href="/requisicoes">Voltar às requisições</a>
</header>
<section class="panel">
{% if error %}<div class="alert red">{{ error }}</div>{% endif %}
<form method="post" class="form-stack">
  <div class="form-grid">
    <label>Departamento<input value="{{ user.department.name if user.department else 'Sem departamento definido' }}" disabled></label>
    <label>Gestor Operacional em serviço
      <select name="operational_manager_id" required>
        {% for manager in managers %}
          <option value="{{ manager.id }}" {% if manager.id == default_manager_id %}selected{% endif %}>{{ manager.full_name }} · {{ manager.role.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>A ser autorizado por<input value="{{ authorization_person }}" disabled></label>
    <label>Tipo<select name="req_type" id="requisition-type"><option>REQUISIÇÃO</option><option>DEVOLUÇÃO</option><option>OUTRO</option></select></label>
  </div>
  <p class="muted">Para requisições, apenas itens com stock podem ser selecionados e a quantidade não pode exceder o disponível.</p>
  <table id="items-table"><thead><tr><th>Código / Item</th><th>Qtde</th><th>Obs</th><th></th></tr></thead><tbody>
    <tr data-requisition-item>
      <td>
        <select name="product_id" required>
          {% for p in products %}
          <option value="{{ p.id }}" data-stock="{{ p.current_stock|float }}" data-unit="{{ p.unit }}">
            {{ p.code }} · {{ p.name }} · disponível {{ p.current_stock }} {{ p.unit }}
          </option>
          {% endfor %}
        </select>
      </td>
      <td>
        <input name="quantity" type="number" step="0.01" min="0.01" value="1" required>
        <small class="stock-hint muted"></small>
      </td>
      <td><input name="observation"></td>
      <td><button type="button" class="secondary compact" data-remove-row>Remover</button></td>
    </tr>
  </tbody></table>
  <div class="actions">
    <button type="button" class="secondary" data-add-row>Adicionar item</button>
    <a class="button secondary" href="/requisicoes">Cancelar</a>
    <button name="draft" value="1" class="blue">Guardar rascunho</button>
    <button name="submit" value="1" class="success">Submeter requisição</button>
  </div>
</form></section>
{% endblock %}
