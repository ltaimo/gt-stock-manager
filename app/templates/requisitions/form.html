{% extends "base.html" %}
{% block content %}
<section class="panel"><h1>Nova Requisição</h1>
{% if error %}<div class="alert red">{{ error }}</div>{% endif %}
<form method="post" class="form-stack">
  <div class="form-grid">
    <label>Departamento<input value="{{ user.department.name if user.department else 'Sem departamento definido' }}" disabled></label>
    <label>Gestor Operacional em serviço
      <select name="operational_manager_id" required>
        {% for manager in managers %}
          <option value="{{ manager.id }}" {% if manager.id == default_manager_id %}selected{% endif %}>{{ manager.full_name }} · {{ manager.role.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>A ser autorizado por<input value="{{ authorization_person }}" disabled></label>
    <label>Tipo<select name="req_type"><option>REQUISIÇÃO</option><option>DEVOLUÇÃO</option><option>OUTRO</option></select></label>
  </div>
  <table id="items-table"><thead><tr><th>Código / Item</th><th>Qtde</th><th>Obs</th></tr></thead><tbody>
    <tr><td><select name="product_id">{% for p in products %}<option value="{{ p.id }}">{{ p.code }} · {{ p.name }} · disponível {{ p.current_stock }} {{ p.unit }}</option>{% endfor %}</select></td><td><input name="quantity" type="number" step="0.01" min="0.01" value="1"></td><td><input name="observation"></td></tr>
  </tbody></table>
  <div class="actions"><button type="button" data-add-row>Adicionar item</button><button name="draft" value="1">Guardar Rascunho</button><button name="submit" value="1">Submeter</button></div>
</form></section>
{% endblock %}
