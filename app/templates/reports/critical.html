{% extends "base.html" %}
{% block content %}<header class="page-header"><h1>Estoque Crítico</h1></header><div class="panel"><table><thead><tr><th>Código</th><th>Produto</th><th>Atual</th><th>Mínimo</th><th>Alerta</th></tr></thead><tbody>{% for p in products %}<tr><td>{{ p.code }}</td><td>{{ p.name }}</td><td>{{ p.current_stock }}</td><td>{{ p.minimum_stock }}</td><td><span class="badge red">{{ p.alert_status }}</span></td></tr>{% endfor %}</tbody></table></div>{% endblock %}
